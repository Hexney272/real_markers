<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
<defs>
  <radialGradient id="halo" cx="50%" cy="70%" r="45%">
    <stop offset="0%" stop-color="#8fe2ff" stop-opacity=".38"/>
    <stop offset="55%" stop-color="#69cfff" stop-opacity=".13"/>
    <stop offset="100%" stop-color="#69cfff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#b9efff" stop-opacity=".95"/>
    <stop offset="55%" stop-color="#7bd6ff" stop-opacity=".75"/>
    <stop offset="100%" stop-color="#66c9f5" stop-opacity=".46"/>
  </linearGradient>
  <linearGradient id="baseFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9de8ff" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#5ec7ff" stop-opacity=".42"/>
  </linearGradient>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="3.2" result="blur"/>
    <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.36  0 0 0 0 0.78  0 0 0 0 1  0 0 0 .82 0" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .ico{fill:url(#fill);stroke:#aeefff;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;filter:url(#glow);}
    .cut{fill:#041017;opacity:.82}
    .line{fill:none;stroke:#092434;stroke-width:5;stroke-linecap:round;opacity:.72}
    .base{fill:url(#baseFill);stroke:#99e8ff;stroke-width:2;filter:url(#glow);opacity:.82}
    .ring{fill:url(#halo);opacity:.75}
  </style>
</defs>
